<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 DeployMaster - Deployment Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(45deg, #56ab2f, #a8e6cf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(86, 171, 47, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(86, 171, 47, 0.3);
        }

        .stat-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #56ab2f;
            margin-bottom: 0.5rem;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* Deployment Cards */
        .deployments {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .deployment-card {
            display: flex;
            align-items: center;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 15px;
            transition: all 0.3s ease;
            border-left: 4px solid #56ab2f;
        }

        .deployment-card.success {
            background: rgba(86, 171, 47, 0.1);
            border-left-color: #56ab2f;
        }

        .deployment-card.failed {
            background: rgba(220, 53, 69, 0.1);
            border-left-color: #dc3545;
        }

        .deployment-card.pending {
            background: rgba(255, 193, 7, 0.1);
            border-left-color: #ffc107;
        }

        .deployment-card:hover {
            transform: translateX(10px);
        }

        .deploy-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 1rem;
            animation: pulse 2s infinite;
        }

        .status-success { background: #56ab2f; }
        .status-failed { background: #dc3545; }
        .status-pending { background: #ffc107; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .deploy-info h3 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        .deploy-meta {
            color: #666;
            font-size: 14px;
            display: flex;
            gap: 1rem;
        }

        /* Sidebar */
        .sidebar {
            display: grid;
            gap: 1.5rem;
        }

        .deploy-btn {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf);
            color: white;
            border: none;
            padding: 1.5rem;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(86, 171, 47, 0.3);
        }

        .deploy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(86, 171, 47, 0.4);
        }

        .quick-actions {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-success { background: #56ab2f; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-warning { background: #ffc107; color: #333; }

        /* History */
        .history {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-height: 400px;
            overflow-y: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-success {
            background: rgba(86, 171, 47, 0.2);
            color: #56ab2f;
            border: 1px solid rgba(86, 171, 47, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀 DeployMaster</h1>
            <p>Modern Deployment Dashboard & CI/CD Pipeline</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-number" id="successCount">47</div>
                <div>Successful</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-number" id="failedCount">3</div>
                <div>Failed</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-number" id="pendingCount">2</div>
                <div>Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-number" id="totalCount">52</div>
                <div>Total Deploys</div>
            </div>
        </div>

        <!-- Alert -->
        <div id="alertContainer" style="margin-bottom: 2rem;"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Deployments -->
            <div class="deployments">
                <h2 style="margin-bottom: 1.5rem; color: #333;">📋 Recent Deployments</h2>
                <div id="deploymentsList">
                    <!-- Deployments populated by JS -->
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Deploy Button -->
                <button class="deploy-btn" onclick="triggerDeploy()">
                    🚀 New Deployment
                </button>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <h3 style="margin-bottom: 1.5rem; color: #333;">⚡ Quick Actions</h3>
                    <button class="action-btn btn-success" onclick="rollbackDeploy()">🔄 Rollback</button>
                    <button class="action-btn btn-warning" onclick="retryDeploy()">🔄 Retry Failed</button>
                    <button class="action-btn btn-danger" onclick="cancelDeploy()">⏹️ Cancel All</button>
                </div>

                <!-- Deployment History -->
                <div class="history">
                    <h3 style="margin-bottom: 1.5rem; color: #333;">📜 History</h3>
                    <div id="historyList">
                        <!-- History populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let deployments = [];
        let deploymentId = 1;

        // Sample deployments
        function initializeDeployments() {
            deployments = [
                { id: deploymentId++, app: 'Frontend App', status: 'success', time: '2 min ago', env: 'Production' },
                { id: deploymentId++, app: 'API Service', status: 'success', time: '5 min ago', env: 'Production' },
                { id: deploymentId++, app: 'Database', status: 'pending', time: '8 min ago', env: 'Staging' },
                { id: deploymentId++, app: 'Auth Service', status: 'failed', time: '12 min ago', env: 'Production' },
                { id: deploymentId++, app: 'Payment Gateway', status: 'success', time: '20 min ago', env: 'Production' }
            ];
            updateDeployments();
            updateStats();
            updateHistory();
        }

        function updateDeployments() {
            const container = document.getElementById('deploymentsList');
            container.innerHTML = deployments.slice(0, 5).map(deploy => `
                <div class="deployment-card ${deploy.status}">
                    <div class="deploy-status status-${deploy.status}"></div>
                    <div class="deploy-info">
                        <h3>${deploy.app}</h3>
                        <div class="deploy-meta">
                            <span>${deploy.status.toUpperCase()}</span>
                            <span>${deploy.time}</span>
                            <span>→ ${deploy.env}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const success = deployments.filter(d => d.status === 'success').length;
            const failed = deployments.filter(d => d.status === 'failed').length;
            const pending = deployments.filter(d => d.status === 'pending').length;
            
            document.getElementById('successCount').textContent = success;
            document.getElementById('failedCount').textContent = failed;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('totalCount').textContent = deployments.length;
        }

        function updateHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = deployments.slice(0, 3).map(deploy => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee;">
                    <span>${deploy.app}</span>
                    <span style="color: ${deploy.status === 'success' ? '#56ab2f' : deploy.status === 'failed' ? '#dc3545' : '#ffc107'}">
                        ${deploy.status.toUpperCase()}
                    </span>
                </div>
            `).join('');
        }

        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 4000);
        }

        function triggerDeploy() {
            const newDeploy = {
                id: deploymentId++,
                app: `App-${Math.floor(Math.random() * 1000)}`,
                status: 'pending',
                time: 'Just now',
                env: Math.random() > 0.5 ? 'Production' : 'Staging'
            };
            
            deployments.unshift(newDeploy);
            updateDeployments();
            updateStats();
            updateHistory();
            
            // Simulate deployment
            setTimeout(() => {
                const index = deployments.findIndex(d => d.id === newDeploy.id);
                if (index !== -1) {
                    deployments[index].status = Math.random() > 0.1 ? 'success' : 'failed';
                    deployments[index].time = '1 min ago';
                    updateDeployments();
                    updateStats();
                    updateHistory();
                    showAlert(`Deployment ${newDeploy.app} ${deployments[index].status.toUpperCase()}!`);
                }
            }, 3000);
            
            showAlert('🚀 Deployment started...', 'success');
        }

        function rollbackDeploy() {
            showAlert('🔄 Rollback initiated');
        }

        function retryDeploy() {
            showAlert('🔄 Retrying failed deployments...');
        }

        function cancelDeploy() {
            showAlert('⏹️ All deployments cancelled');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', initializeDeployments);
    </script>
</body>
</html>
